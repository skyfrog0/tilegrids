<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Pyramid View - WebMercator / WGS84</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: "Segoe UI", Arial, sans-serif; background: #1e1e1e; color: #ddd; }
    .container { display: flex; height: 100%; width: 100%; }
    .panel {
        flex: 1;
        position: relative;
        overflow: hidden;
        border-right: 1px solid #444;
    }
    .panel:last-child { border-right: none; }
    .panel-title {
        position: absolute; top: 10px; left: 10px; z-index: 10;
        background: rgba(30,30,30,0.85); color: #fff;
        padding: 6px 12px; border-radius: 4px;
        font-weight: bold; font-size: 13px;
        border: 1px solid #555;
        pointer-events: none;
    }
    .panel-title .sub { font-weight: normal; color: #aaa; font-size: 11px; margin-left: 8px; }
    .info-box {
        position: absolute; top: 10px; right: 10px; z-index: 10;
        background: rgba(30,30,30,0.85); color: #ddd;
        padding: 8px 12px; border-radius: 4px;
        font-size: 12px; line-height: 1.6;
        border: 1px solid #555;
        pointer-events: none;
        font-family: Consolas, "Courier New", monospace;
        min-width: 180px;
    }
    .info-box .label { color: #888; }
    .info-box .val { color: #fff; }
    .info-box .sep { color: #444; margin: 0 4px; }
    canvas { display: block; width: 100%; height: 100%; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
    .help-tip {
        position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
        z-index: 10; background: rgba(30,30,30,0.85); color: #aaa;
        padding: 5px 14px; border-radius: 4px; font-size: 11px;
        border: 1px solid #555; pointer-events: none;
    }
</style>
</head>
<body>
<div class="container">
    <div class="panel" id="panel-left">
        <div class="panel-title">WebMercator 金字塔 <span class="sub">EPSG:3857 · 红色网格</span></div>
        <div class="info-box" id="info-left"></div>
        <canvas id="canvas-left"></canvas>
        <div class="help-tip">拖拽平移 · 滚轮缩放（倍率2）</div>
    </div>
    <div class="panel" id="panel-right">
        <div class="panel-title">WGS84 经纬度直投金字塔 <span class="sub">EPSG:4326 · 蓝色网格</span></div>
        <div class="info-box" id="info-right"></div>
        <canvas id="canvas-right"></canvas>
        <div class="help-tip">拖拽平移 · 滚轮缩放（倍率2）</div>
    </div>
</div>

<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
/**
 * Hilbert curve tile ID encoding following PMTiles v3 spec.
 * Reference: https://github.com/protomaps/PMTiles
 */

function rotate(n, x, y, rx, ry) {
  if (ry === 0) {
    if (rx !== 0) {
      x = n - 1 - x;
      y = n - 1 - y;
    }
    return [y, x];
  }
  return [x, y];
}

/**
 * Convert Z,X,Y to a Hilbert TileID.
 */
function ZxyToID(z, x, y) {
  if (z > 26) {
    throw new Error("Tile zoom level exceeds max safe number limit (26)");
  }
  if (x >= (1 << z) || y >= (1 << z)) {
    throw new Error("tile x/y outside zoom level bounds");
  }
  
  let acc = ((1 << z) * (1 << z) - 1) / 3;
  let a = z - 1;
  let [tx, ty] = [x, y];
  
  for (let s = 1 << a; s > 0; s >>= 1) {
    const rx = s & tx;
    const ry = s & ty;
    acc += ((3 * rx) ^ ry) * (1 << a);
    [tx, ty] = rotate(s, tx, ty, rx, ry);
    a--;
  }
  
  return Math.floor(acc);
}


(function () {
    'use strict';

    // ---- 常量 ----
    var WEBMERCATOR_R = 20037508.342789244; // WebMercator 半幅宽（米）
    var TILE_PX = 256;                        // 每个瓦片在屏幕上的基础像素大小
    var MIN_ZOOM = 0;
    var MAX_ZOOM = 12;

    // ---- 坐标转换工具 ----
    // 经纬度 -> WebMercator (米)
    // WEBMERCATOR_R = R_earth * π = 20037508.34（即 x 方向最大值，对应 lng=180）
    // x = WEBMERCATOR_R * lng / 180
    // y = WEBMERCATOR_R / π * ln(tan(π/4 + latRad/2))   其中 latRad = lat * π/180
    function lngLatToMercator(lng, lat) {
        var x = lng * WEBMERCATOR_R / 180;
        var y = Math.log(Math.tan((90 + lat) * Math.PI / 360)) / (Math.PI / 180) * WEBMERCATOR_R / 180;
        return { x: x, y: y };
    }
    // WebMercator (米) -> 经纬度
    function mercatorToLngLat(x, y) {
        var lng = x / WEBMERCATOR_R * 180;
        var latRad = 2 * Math.atan(Math.exp(y / WEBMERCATOR_R * Math.PI)) - Math.PI / 2;
        var lat = latRad * 180 / Math.PI;
        return { lng: lng, lat: lat };
    }

    // ---- 中国 GeoJSON 数据加载 ----
    var chinaGeoJSON = null;
    var chinaDataLoaded = false;
    var chinaCache = {}; // 缓存结构: chinaCache[type][zoom][key] = { geometries, tileX, tileY }
    var chinaSimplified = null; // 简化后的数据

    function simplifyChinaData() {
        if (!chinaGeoJSON || chinaSimplified) return;
        try {
            // 将 GeoJSON 转换为 Turf 对象并简化
            var fc = turf.featureCollection(chinaGeoJSON.features);
            // 简化容差：根据数据范围动态调整，约 0.01 度（约 1km）
            var simplified = turf.simplify(fc, { tolerance: 0.01, highQuality: false, mutate: false });
            chinaSimplified = simplified;
            console.log('China GeoJSON simplified. Features:', simplified.features.length);
        } catch (e) {
            console.warn('Simplify failed, using original data:', e);
            chinaSimplified = chinaGeoJSON;
        }
    }

    function loadChinaData() {
        fetch('china.json')
            .then(function(response) {
                if (!response.ok) {
                    throw new Error('Failed to load china.json');
                }
                return response.json();
            })
            .then(function(data) {
                chinaGeoJSON = data;
                // 简化数据
                simplifyChinaData();
                chinaDataLoaded = true;
                console.log('China GeoJSON loaded successfully');
                // 初始化缓存结构
                chinaCache['webmercator'] = {};
                chinaCache['wgs84'] = {};
                for (var z = MIN_ZOOM; z <= MAX_ZOOM; z++) {
                    chinaCache['webmercator'][z] = {};
                    chinaCache['wgs84'][z] = {};
                }
                // 触发重绘
                if (viewLeft) viewLeft.draw();
                if (viewRight) viewRight.draw();
            })
            .catch(function(error) {
                console.error('Error loading China GeoJSON:', error);
            });
    }

    // ---- 视图类 ----
    function PyramidView(canvas, infoBox, type) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.infoBox = infoBox;
        this.type = type; // 'webmercator' | 'wgs84'

        this.zoom = 0;
        // 中心点：webmercator 用米；wgs84 用经纬度（度）
        if (type === 'webmercator') {
            this.centerX = 0;
            this.centerY = 0;
        } else {
            this.centerX = 0; // 经度
            this.centerY = 0; // 纬度
        }

        this.dpr = window.devicePixelRatio || 1;
        this.resize();

        var self = this;
        this._onResize = function () { self.resize(); self.draw(); };
    }

    PyramidView.prototype.resize = function () {
        var rect = this.canvas.getBoundingClientRect();
        this.cssW = rect.width;
        this.cssH = rect.height;
        this.dpr = window.devicePixelRatio || 1;
        this.canvas.width = Math.round(this.cssW * this.dpr);
        this.canvas.height = Math.round(this.cssH * this.dpr);
        this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    };

    // 各层级的世界尺寸与瓦片数
    PyramidView.prototype.getWorldExtent = function () {
        if (this.type === 'webmercator') {
            return { minX: -WEBMERCATOR_R, maxX: WEBMERCATOR_R, minY: -WEBMERCATOR_R, maxY: WEBMERCATOR_R };
        } else {
            return { minX: -180, maxX: 180, minY: -90, maxY: 90 };
        }
    };

    PyramidView.prototype.getTileCounts = function (z) {
        z = (z === undefined) ? this.zoom : z;
        if (this.type === 'webmercator') {
            return { nx: Math.pow(2, z), ny: Math.pow(2, z) };
        } else {
            return { nx: Math.pow(2, z + 1), ny: Math.pow(2, z) };
        }
    };

    PyramidView.prototype.getTileWorldSize = function (z) {
        var ext = this.getWorldExtent();
        var c = this.getTileCounts(z);
        return { w: (ext.maxX - ext.minX) / c.nx, h: (ext.maxY - ext.minY) / c.ny };
    };

    // 屏幕像素 / 世界单位（横纵使用同一 scale，瓦片在屏幕上保持正方形/正确比例）
    PyramidView.prototype.getScale = function () {
        var tw = this.getTileWorldSize();
        return TILE_PX / tw.w;
    };

    PyramidView.prototype.worldToScreen = function (wx, wy) {
        var s = this.getScale();
        return {
            x: (wx - this.centerX) * s + this.cssW / 2,
            y: (this.centerY - wy) * s + this.cssH / 2 // y 翻转：纬度/米 y 向上为正
        };
    };

    PyramidView.prototype.screenToWorld = function (sx, sy) {
        var s = this.getScale();
        return {
            x: (sx - this.cssW / 2) / s + this.centerX,
            y: this.centerY - (sy - this.cssH / 2) / s
        };
    };

    // 由瓦片编号得到世界范围（左上角 + 宽高）
    PyramidView.prototype.tileToWorld = function (z, tx, ty) {
        var ext = this.getWorldExtent();
        var tw = this.getTileWorldSize(z);
        var x0 = ext.minX + tx * tw.w;
        var y0 = ext.maxY - ty * tw.h; // 左上角纬度/米
        return { x0: x0, y0: y0, w: tw.w, h: tw.h };
    };

    PyramidView.prototype.draw = function () {
        var ctx = this.ctx;
        ctx.clearRect(0, 0, this.cssW, this.cssH);

        // 背景
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, this.cssW, this.cssH);

        var z = this.zoom;
        var counts = this.getTileCounts(z);
        var tw = this.getTileWorldSize(z);

        // 计算可见瓦片范围（用世界坐标反算）
        var tl = this.screenToWorld(0, 0);
        var br = this.screenToWorld(this.cssW, this.cssH);
        var ext = this.getWorldExtent();

        // 视图世界范围（minX/maxX/minY/maxY）
        var viewMinX = Math.min(tl.x, br.x);
        var viewMaxX = Math.max(tl.x, br.x);
        var viewMaxY = Math.max(tl.y, br.y);
        var viewMinY = Math.min(tl.y, br.y);

        var startX = Math.floor((viewMinX - ext.minX) / tw.w);
        var endX = Math.floor((viewMaxX - ext.minX) / tw.w);
        var startY = Math.floor((ext.maxY - viewMaxY) / tw.h);
        var endY = Math.floor((ext.maxY - viewMinY) / tw.h);

        startX = Math.max(0, startX);
        startY = Math.max(0, startY);
        endX = Math.min(counts.nx - 1, endX);
        endY = Math.min(counts.ny - 1, endY);

        var strokeColor = this.type === 'webmercator' ? '#ff4d4f' : '#1890ff';
        var textColor = this.type === 'webmercator' ? '#ff8a8c' : '#69c0ff';
        var fillBg = this.type === 'webmercator' ? 'rgba(255,77,79,0.06)' : 'rgba(24,144,255,0.06)';

        ctx.lineWidth = 1;
        ctx.strokeStyle = strokeColor;

        ctx.font = '24px Consolas, "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        for (var ty = startY; ty <= endY; ty++) {
            for (var tx = startX; tx <= endX; tx++) {
                var box = this.tileToWorld(z, tx, ty);
                var p1 = this.worldToScreen(box.x0, box.y0);            // 左上
                var p2 = this.worldToScreen(box.x0 + box.w, box.y0 - box.h); // 右下
                var sx0 = p1.x, sy0 = p1.y, sw = p2.x - p1.x, sh = p2.y - p1.y;

                // 填充淡背景
                ctx.fillStyle = fillBg;
                ctx.fillRect(sx0, sy0, sw, sh);
                // 边框
                ctx.strokeStyle = strokeColor;
                ctx.strokeRect(sx0 + 0.5, sy0 + 0.5, sw - 1, sh - 1);

                // 绘制瓦片标签（调用独立函数）
                this.drawTileLabel(ctx, z, tx, ty, sx0, sy0, sw, sh, textColor);
            }
        }

        // ---- 绘制中国 GeoJSON 数据 ----
        if (chinaDataLoaded && chinaGeoJSON) {
            this.drawChinaGeoJSON(ctx, z, startX, startY, endX, endY);
        }

        // 绘制中心十字
        var center = this.worldToScreen(this.centerX, this.centerY);
        ctx.strokeStyle = 'rgba(255,255,0,0.8)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(center.x - 8, center.y);
        ctx.lineTo(center.x + 8, center.y);
        ctx.moveTo(center.x, center.y - 8);
        ctx.lineTo(center.x, center.y + 8);
        ctx.stroke();

        // 边界外框（世界范围）
        var a = this.worldToScreen(ext.minX, ext.maxY);
        var b = this.worldToScreen(ext.maxX, ext.minY);
        ctx.strokeStyle = 'rgba(180,180,180,0.4)';
        ctx.setLineDash([4, 4]);
        ctx.strokeRect(a.x + 0.5, a.y + 0.5, b.x - a.x - 1, b.y - a.y - 1);
        ctx.setLineDash([]);

        this.updateInfo();
    };

    PyramidView.prototype.updateInfo = function () {
        var z = this.zoom;
        var counts = this.getTileCounts(z);
        var centerDesc;
        var idDesc;
        if (this.type === 'webmercator') {
            var ll = mercatorToLngLat(this.centerX, this.centerY);
            centerDesc = 'center(lng,lat): ' + ll.lng.toFixed(4) + ', ' + ll.lat.toFixed(4)
                       + '<br>center(m): ' + this.centerX.toFixed(0) + ', ' + this.centerY.toFixed(0);
            idDesc = 'ZxyToID(z, x, y)';
        } else {
            centerDesc = 'center(lng,lat): ' + this.centerX.toFixed(4) + ', ' + this.centerY.toFixed(4);
            idDesc = 'ZxyToID(z+1, x, y) · 2:1 嵌入 z+1 正方形';
        }
        this.infoBox.innerHTML =
            '<span class="label">zoom:</span> <span class="val">' + z + '</span><br>'
            + '<span class="label">tiles:</span> <span class="val">' + counts.nx + ' × ' + counts.ny + ' = ' + (counts.nx * counts.ny) + '</span><br>'
            + '<span class="label">tileId:</span> <span class="val">' + idDesc + '</span><br>'
            + centerDesc;
    };

    // ---- 中国 GeoJSON 数据绘制（带缓存优化）----

    // 获取指定瓦片的裁剪缓存（懒加载：首次访问时计算并缓存）
    PyramidView.prototype.getChinaTileCache = function(z, tx, ty) {
        var typeCache = chinaCache[this.type];
        if (!typeCache) return null;
        var zoomCache = typeCache[z];
        if (!zoomCache) return null;
        var key = tx + ',' + ty;
        if (zoomCache.hasOwnProperty(key)) {
            return zoomCache[key]; // 可能是 null（无数据）
        }

        // 首次访问：计算并缓存
        var result = this.computeChinaTileClip(z, tx, ty);
        zoomCache[key] = result; // 缓存结果（可能是 null）
        return result;
    };

    // 计算单个瓦片的中国地图裁剪数据（返回经纬度坐标的几何体数组）
    PyramidView.prototype.computeChinaTileClip = function(z, tx, ty) {
        var data = chinaSimplified || chinaGeoJSON;
        if (!data || !data.features) return null;

        var bbox = this.getTileBBox(z, tx, ty);
        if (!bbox) return null;

        var turfBBox = [bbox.minLng, bbox.minLat, bbox.maxLng, bbox.maxLat];
        var clipBox = turf.bboxPolygon(turfBBox);
        var results = [];

        for (var i = 0; i < data.features.length; i++) {
            var feature = data.features[i];
            var geometry = feature.geometry;
            if (!geometry) continue;

            var clipped;
            try {
                if (geometry.type === 'Polygon') {
                    clipped = turf.intersect(turf.polygon(geometry.coordinates), clipBox);
                } else if (geometry.type === 'MultiPolygon') {
                    clipped = turf.intersect(turf.multiPolygon(geometry.coordinates), clipBox);
                }
            } catch (e) {
                continue;
            }

            if (!clipped || !clipped.geometry) continue;
            // 转换为视图原生坐标系后存储（避免每帧重复转换）
            results.push(this.convertGeomToViewNative(clipped.geometry));
        }

        return results.length > 0 ? results : null;
    };

    // 将裁剪后的几何体坐标转换为视图原生坐标系
    // WebMercator: 经纬度 → 墨卡托坐标（米）
    // WGS84: 保持经纬度不变
    PyramidView.prototype.convertGeomToViewNative = function(geometry) {
        var self = this;
        function convertRing(coords) {
            return coords.map(function(c) {
                if (self.type === 'webmercator') {
                    var m = lngLatToMercator(c[0], c[1]);
                    return [m.x, m.y];
                }
                return [c[0], c[1]]; // WGS84 保持经纬度
            });
        }

        var newCoords = [];
        if (geometry.type === 'Polygon') {
            for (var r = 0; r < geometry.coordinates.length; r++) {
                newCoords.push(convertRing(geometry.coordinates[r]));
            }
        } else if (geometry.type === 'MultiPolygon') {
            for (var p = 0; p < geometry.coordinates.length; p++) {
                var rings = [];
                for (var r = 0; r < geometry.coordinates[p].length; r++) {
                    rings.push(convertRing(geometry.coordinates[p][r]));
                }
                newCoords.push(rings);
            }
        }

        return {
            type: geometry.type,
            coordinates: geometry.type === 'Polygon' ? newCoords : newCoords
        };
    };

    // 绘制已缓存的几何体（坐标已在视图原生坐标系，直接用 worldToScreen，极快）
    PyramidView.prototype.drawClippedGeometry = function(ctx, geometry) {
        var self = this;

        function drawRing(coords) {
            if (coords.length < 3) return;
            ctx.beginPath();
            for (var i = 0; i < coords.length; i++) {
                var pt = self.worldToScreen(coords[i][0], coords[i][1]);
                if (i === 0) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }

        if (geometry.type === 'Polygon') {
            for (var r = 0; r < geometry.coordinates.length; r++) {
                drawRing(geometry.coordinates[r]);
            }
        } else if (geometry.type === 'MultiPolygon') {
            for (var p = 0; p < geometry.coordinates.length; p++) {
                for (var r = 0; r < geometry.coordinates[p].length; r++) {
                    drawRing(geometry.coordinates[p][r]);
                }
            }
        }
    };

    // 绘制中国 GeoJSON（使用缓存的裁剪结果）
    PyramidView.prototype.drawChinaGeoJSON = function(ctx, z, startX, startY, endX, endY) {
        ctx.fillStyle = 'rgba(255, 248, 240, 0.7)';
        ctx.strokeStyle = '#FF69B4';
        ctx.lineWidth = 1;

        for (var ty = startY; ty <= endY; ty++) {
            for (var tx = startX; tx <= endX; tx++) {
                var geoms = this.getChinaTileCache(z, tx, ty);
                if (!geoms) continue;
                for (var g = 0; g < geoms.length; g++) {
                    this.drawClippedGeometry(ctx, geoms[g]);
                }
            }
        }
    };

    // 获取瓦片的地理边界框（经纬度）
    PyramidView.prototype.getTileBBox = function(z, tx, ty) {
        var counts = this.getTileCounts(z);
        var tw = this.getTileWorldSize(z);
        var ext = this.getWorldExtent();

        if (this.type === 'webmercator') {
            var x0 = ext.minX + tx * tw.w;
            var y0 = ext.maxY - ty * tw.h;
            var x1 = x0 + tw.w;
            var y1 = y0 - tw.h;
            var ll0 = mercatorToLngLat(x0, y0);
            var ll1 = mercatorToLngLat(x1, y1);
            return { minLng: ll0.lng, minLat: ll1.lat, maxLng: ll1.lng, maxLat: ll0.lat };
        } else {
            return {
                minLng: ext.minX + tx * tw.w,
                minLat: ext.minY + (counts.ny - ty - 1) * tw.h,
                maxLng: ext.minX + (tx + 1) * tw.w,
                maxLat: ext.minY + (counts.ny - ty) * tw.h
            };
        }
    };

    // 设置中心点（按本视图的坐标系）
    PyramidView.prototype.setCenter = function (cx, cy) {
        this.centerX = cx;
        this.centerY = cy;
    };

    PyramidView.prototype.setZoom = function (z) {
        this.zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, z));
    };

    // 计算 PMTiles Hilbert TileID。
    // ZxyToID 要求正方形网格 (2^z × 2^z，x,y ∈ [0, 2^z))：
    //   - WebMercator：正方形，直接 ZxyToID(z, x, y)
    //   - WGS84 直投：2:1 网格 (2^(z+1) × 2^z)，x 可达 2^(z+1)-1 会越界，
    //     嵌入到 z+1 正方形网格，用 ZxyToID(z+1, x, y)
    //     （x∈[0,2^(z+1)) 合法；y∈[0,2^z) ⊂ [0,2^(z+1)) 合法）
    // 返回 { id, hilbertZ }，hilbertZ 为实际参与 Hilbert 编码的层级
    PyramidView.prototype.computeTileId = function (z, x, y) {
        if (this.type === 'webmercator') {
            return { id: ZxyToID(z, x, y), hilbertZ: z };
        }
        var hz = z + 1;
        return { id: ZxyToID(hz, x, y), hilbertZ: hz };
    };

    // ---- 绘制瓦片标签（z=1  x=0  y=0 / tileId=1）----
    PyramidView.prototype.drawTileLabel = function (ctx, z, tx, ty, sx0, sy0, sw, sh, textColor) {
        if (sw < 200 || sh < 60) return; // 瓦片太小，不显示（24px 字体需要更多空间）

        var cx = sx0 + sw / 2;
        var cy = sy0 + sh / 2;

        var idInfo = null;
        try { idInfo = this.computeTileId(z, tx, ty); }
        catch (e) { idInfo = null; }
        var idStr = idInfo ? idInfo.id : 'N/A';

        // 设置字体
        ctx.font = '24px Consolas, "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        if (z > 10) {
            // zoom > 10：z, x, y, tileId 各自独立一行（四行显示）
            var lineHeight = 32;
            var totalHeight = lineHeight * 4 - 8; // 四行的总高度
            var startY = cy - totalHeight / 2 + lineHeight / 2;

            ctx.fillStyle = textColor;
            ctx.fillText('z=' + z, cx, startY);
            ctx.fillText('x=' + tx, cx, startY + lineHeight);
            ctx.fillText('y=' + ty, cx, startY + lineHeight * 2);

            ctx.fillStyle = '#ffd666';
            ctx.fillText('tileId=' + idStr, cx, startY + lineHeight * 3);
        } else {
            // zoom <= 10：保持现状（两行显示）
            // 第一行：z=1  x=0  y=0
            ctx.fillStyle = textColor;
            ctx.fillText('z=' + z + '  x=' + tx + '  y=' + ty, cx, cy - 14);

            // 第二行：tileId=1（黄色）
            ctx.fillStyle = '#ffd666';
            ctx.fillText('tileId=' + idStr, cx, cy + 14);
        }
    };

    // ---- 联动控制 ----
    function App() {
        var leftCanvas = document.getElementById('canvas-left');
        var rightCanvas = document.getElementById('canvas-right');
        var leftInfo = document.getElementById('info-left');
        var rightInfo = document.getElementById('info-right');

        this.left = new PyramidView(leftCanvas, leftInfo, 'webmercator');
        this.right = new PyramidView(rightCanvas, rightInfo, 'wgs84');

        // 同步初始（中心点已是各自坐标系的 0,0,经纬度 0,0 对应）
        this._syncing = false;
        this.bindEvents(this.left, 'left');
        this.bindEvents(this.right, 'right');

        var self = this;
        window.addEventListener('resize', function () {
            self.left._onResize();
            self.right._onResize();
        });

        this.left.draw();
        this.right.draw();

        // 加载中国 GeoJSON 数据
        loadChinaData();
    }

    // 把一个视图的中心点同步到另一个视图（保持地理位置一致）
    App.prototype.syncCenter = function (from) {
        if (this._syncing) return;
        this._syncing = true;
        var to = (from === this.left) ? this.right : this.left;
        if (from === this.left) {
            // left 是 mercator，转成经纬度给 right
            var ll = mercatorToLngLat(from.centerX, from.centerY);
            to.setCenter(ll.lng, ll.lat);
        } else {
            // right 是经纬度，转成 mercator 给 left
            var m = lngLatToMercator(from.centerX, from.centerY);
            to.setCenter(m.x, m.y);
        }
        to.draw();
        this._syncing = false;
    };

    App.prototype.syncZoom = function (from) {
        if (this._syncing) return;
        this._syncing = true;
        var to = (from === this.left) ? this.right : this.left;
        to.zoom = from.zoom;
        to.draw();
        this._syncing = false;
    };

    App.prototype.bindEvents = function (view, side) {
        var self = this;
        var canvas = view.canvas;

        // ---- 拖拽平移 ----
        var dragging = false;
        var lastX = 0, lastY = 0;

        canvas.addEventListener('mousedown', function (e) {
            dragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            canvas.classList.add('dragging');
            e.preventDefault();
        });
        window.addEventListener('mousemove', function (e) {
            if (!dragging) return;
            var dx = e.clientX - lastX;
            var dy = e.clientY - lastY;
            lastX = e.clientX;
            lastY = e.clientY;
            var s = view.getScale();
            // 平移：屏幕移动 dx,dy -> 中心反向移动
            view.centerX -= dx / s;
            view.centerY += dy / s;
            view.draw();
            // 联动另一边（按中心点地理位置同步）
            self.syncCenter(view);
        });
        window.addEventListener('mouseup', function () {
            if (dragging) {
                dragging = false;
                canvas.classList.remove('dragging');
            }
        });

        // ---- 滚轮缩放（倍率2，每次层级±1）----
        canvas.addEventListener('wheel', function (e) {
            e.preventDefault();
            var dir = e.deltaY < 0 ? 1 : -1; // 上滚放大
            var newZoom = view.zoom + dir;
            if (newZoom < MIN_ZOOM || newZoom > MAX_ZOOM) return;

            // 以鼠标位置为缩放中心：保持鼠标下的世界点不变
            var rect = canvas.getBoundingClientRect();
            var mx = e.clientX - rect.left;
            var my = e.clientY - rect.top;
            var worldBefore = view.screenToWorld(mx, my);

            view.setZoom(newZoom);

            // 同步层级到另一边
            self.syncZoom(view);

            var worldAfter = view.screenToWorld(mx, my);
            view.centerX += worldBefore.x - worldAfter.x;
            view.centerY += worldBefore.y - worldAfter.y;
            view.draw();

            // 由于层级变化后两边 scale 也变，平移联动需重新基于中心点同步
            // 同时把当前视图的中心点同步给另一边
            self.syncCenter(view);
        }, { passive: false });

        // ---- 触摸支持（简单单指拖拽 + 双指缩放）----
        var touchState = null;
        canvas.addEventListener('touchstart', function (e) {
            if (e.touches.length === 1) {
                touchState = { mode: 'pan', x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.touches.length === 2) {
                var dx = e.touches[0].clientX - e.touches[1].clientX;
                var dy = e.touches[0].clientY - e.touches[1].clientY;
                touchState = { mode: 'pinch', dist: Math.hypot(dx, dy) };
            }
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchmove', function (e) {
            if (!touchState) return;
            if (touchState.mode === 'pan' && e.touches.length === 1) {
                var dx = e.touches[0].clientX - touchState.x;
                var dy = e.touches[0].clientY - touchState.y;
                touchState.x = e.touches[0].clientX;
                touchState.y = e.touches[0].clientY;
                var s = view.getScale();
                view.centerX -= dx / s;
                view.centerY += dy / s;
                view.draw();
                self.syncCenter(view);
            } else if (touchState.mode === 'pinch' && e.touches.length === 2) {
                var ddx = e.touches[0].clientX - e.touches[1].clientX;
                var ddy = e.touches[0].clientY - e.touches[1].clientY;
                var newDist = Math.hypot(ddx, ddy);
                var ratio = newDist / touchState.dist;
                if (ratio > 1.5) {
                    var nz = view.zoom + 1;
                    if (nz <= MAX_ZOOM) { view.setZoom(nz); self.syncZoom(view); self.syncCenter(view); view.draw(); touchState.dist = newDist; }
                } else if (ratio < 0.66) {
                    var nz2 = view.zoom - 1;
                    if (nz2 >= MIN_ZOOM) { view.setZoom(nz2); self.syncZoom(view); self.syncCenter(view); view.draw(); touchState.dist = newDist; }
                }
            }
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchend', function () { touchState = null; });
    };

    // 启动
    window.addEventListener('DOMContentLoaded', function () {
        new App();
    });
})();
</script>
</body>
</html>
